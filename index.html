<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas · Cia do Fitness</title>
  <meta name="theme-color" content="#f5f5f3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tarefas" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface-2: #f0f0ee;
      --border: #e0e0de;
      --text: #1a1a1a;
      --text-muted: #888885;
      --text-faint: #b8b8b5;
      --yellow: #F5C400;
      --yellow-dark: #c9a000;
      --black: #1a1a1a;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--yellow);
      border-radius: 50%;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 2px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 3px;
    }

    .tab {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    /* ── MAIN ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 20px 100px;
    }

    /* ── SEÇÃO ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    /* ── CARD DE TAREFA ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 32px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.15s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }

    .task-card:hover {
      box-shadow: var(--shadow-md);
    }

    /* Checkbox */
    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-left: 4px;
    }

    .task-check:hover {
      border-color: var(--yellow);
      background: rgba(245,196,0,0.08);
    }

    .task-check.done {
      background: var(--yellow);
      border-color: var(--yellow);
    }

    .task-check.done::after {
      content: '';
      width: 10px;
      height: 6px;
      border-left: 2px solid var(--black);
      border-bottom: 2px solid var(--black);
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    /* Conteúdo */
    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
      transition: color 0.2s;
    }

    .task-title.done {
      color: var(--text-faint);
      text-decoration: line-through;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    /* Tag de responsável */
    .resp-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .resp-tag:hover { opacity: 0.8; }

    /* Idade */
    .task-age {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.03em;
    }

    .task-age.warn { color: #b8860b; font-weight: 500; }
    .task-age.alert { color: #8a6a00; font-weight: 600; }

    /* Botão deletar */
    .task-delete {
      opacity: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
      font-size: 16px;
      line-height: 1;
    }

    .task-card:hover .task-delete { opacity: 1; }
    .task-delete:hover { color: #cc0000; background: rgba(200,0,0,0.06); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-faint);
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-text { font-size: 13px; }

    /* ── HISTÓRICO ── */
    .month-group { margin-bottom: 32px; }

    .month-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .hist-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0.7;
    }

    .hist-check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
    }

    .hist-check::after {
      content: '';
      width: 9px;
      height: 5px;
      border-left: 1.5px solid var(--text-faint);
      border-bottom: 1.5px solid var(--text-faint);
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    .hist-title {
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: line-through;
      flex: 1;
    }

    .hist-info {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-faint);
      text-align: right;
      white-space: nowrap;
    }

    /* ── CONFIGURAÇÕES ── */
    .config-section { margin-bottom: 32px; }

    .config-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 12px;
    }

    .resp-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .resp-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .resp-name {
      flex: 1;
      font-size: 14px;
    }

    .resp-delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      font-size: 14px;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .resp-delete-btn:hover { color: #cc0000; }

    .add-resp-form {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .input-text {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .input-text:focus { border-color: var(--yellow); }

    .input-color {
      width: 40px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 3px;
      background: var(--surface);
    }

    .btn-sm {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 9px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: var(--yellow);
      color: var(--black);
    }

    .btn-primary:hover { background: var(--yellow-dark); color: #fff; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--yellow);
      color: var(--black);
      font-size: 24px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(245,196,0,0.4), 0 2px 4px rgba(0,0,0,0.12);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 200;
      line-height: 1;
    }

    .fab:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(245,196,0,0.5), 0 3px 6px rgba(0,0,0,0.14);
    }

    .fab.hidden { display: none; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 24px 40px;
      width: 100%;
      max-width: 680px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .modal-input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }

    .modal-input:focus { border-color: var(--yellow); }

    .modal-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 8px;
    }

    .resp-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .resp-option {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }

    .resp-option.selected {
      border-color: var(--yellow);
      background: var(--yellow);
      color: var(--black);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
    }

    .btn-cancel {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:hover { background: var(--surface-2); }

    .btn-save {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: var(--yellow);
      color: var(--black);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-save:hover { background: var(--yellow-dark); color: #fff; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── ASSIGN MODAL ── */
    .assign-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(3px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      padding: 20px;
    }

    .assign-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .assign-modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 20px;
      width: 100%;
      max-width: 320px;
      box-shadow: var(--shadow-md);
    }

    .assign-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-muted);
    }

    .assign-options { display: flex; flex-direction: column; gap: 6px; }

    .assign-option {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .assign-option:hover { border-color: var(--yellow); background: rgba(245,196,0,0.06); }

    .assign-cancel {
      width: 100%;
      margin-top: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      padding: 8px;
      border: none;
      background: none;
      color: var(--text-faint);
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .assign-cancel:hover { background: var(--surface-2); }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--black);
      color: #fff;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      opacity: 0;
      transition: all 0.2s;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── HIDDEN ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── ANIMAÇÃO ENTRADA ── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-card { animation: slideIn 0.2s ease; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">Cia do Fitness</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('ativas')">Ativas</button>
      <button class="tab" onclick="switchTab('historico')">Histórico</button>
      <button class="tab" onclick="switchTab('config')">Config</button>
    </div>
  </div>
</header>

<main>
  <!-- ATIVAS -->
  <div id="page-ativas" class="page active">
    <div id="loading-ativas" class="loading">carregando...</div>
    <div id="list-ativas" class="task-list" style="display:none"></div>
    <div id="empty-ativas" class="empty" style="display:none">
      <div class="empty-icon">✓</div>
      <div class="empty-text">Nenhuma tarefa pendente.</div>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div id="page-historico" class="page">
    <div id="loading-hist" class="loading">carregando...</div>
    <div id="list-historico" style="display:none"></div>
    <div id="empty-hist" class="empty" style="display:none">
      <div class="empty-icon">📋</div>
      <div class="empty-text">Nenhuma tarefa concluída ainda.</div>
    </div>
  </div>

  <!-- CONFIG -->
  <div id="page-config" class="page">
    <div class="config-section">
      <div class="config-title">Responsáveis</div>
      <div id="list-responsaveis"></div>

      <div class="add-resp-form">
        <input type="color" id="new-resp-color" class="input-color" value="#1a1a1a" />
        <input type="text" id="new-resp-nome" class="input-text" placeholder="Nome do responsável" maxlength="30" />
        <button class="btn-sm btn-primary" onclick="addResponsavel()">+ Add</button>
      </div>
    </div>
  </div>
</main>

<!-- FAB -->
<button class="fab" id="fab" onclick="openModal()">+</button>

<!-- MODAL NOVA TAREFA -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nova Tarefa</div>
    <input type="text" id="nova-titulo" class="modal-input" placeholder="O que precisa ser feito?" maxlength="120" />
    <div class="modal-label">Responsável</div>
    <div class="resp-options" id="resp-options"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="criarTarefa()">Criar Tarefa</button>
    </div>
  </div>
</div>

<!-- MODAL ATRIBUIR -->
<div class="assign-modal-overlay" id="assign-overlay" onclick="closeAssignIfOutside(event)">
  <div class="assign-modal">
    <div class="assign-title">Atribuir a...</div>
    <div class="assign-options" id="assign-options"></div>
    <button class="assign-cancel" onclick="closeAssignModal()">Cancelar</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ptweuugkqsodgqywmsxi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0d2V1dWdrcXNvZGdxeXdtc3hpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5MjI0NzIsImV4cCI6MjA2MDQ5ODQ3Mn0.Wz9GqRj3RbVvAbaSBR6IuzHUF8cGQrHiUl0Xgh7JDkM';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let responsaveis = [];
let tarefasAtivas = [];
let currentTab = 'ativas';
let assigningTaskId = null;
let selectedRespId = null;

// ── INIT ──
async function init() {
  await loadResponsaveis();
  await loadAtivas();
  setupRealtime();
}

// ── RESPONSÁVEIS ──
async function loadResponsaveis() {
  const { data } = await sb.from('tarefas_responsaveis').select('*').order('criado_em');
  responsaveis = data || [];
  renderResponsaveis();
  renderRespOptions();
}

function getRespById(id) {
  return responsaveis.find(r => r.id === id);
}

function renderResponsaveis() {
  const el = document.getElementById('list-responsaveis');
  if (!el) return;
  el.innerHTML = '';
  responsaveis.forEach(r => {
    const div = document.createElement('div');
    div.className = 'resp-item';
    div.innerHTML = `
      <div class="resp-color-dot" style="background:${r.cor}"></div>
      <span class="resp-name">${r.nome}</span>
      <button class="resp-delete-btn" onclick="deleteResponsavel('${r.id}')">✕</button>
    `;
    el.appendChild(div);
  });
}

function renderRespOptions() {
  const el = document.getElementById('resp-options');
  if (!el) return;
  el.innerHTML = '';
  responsaveis.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'resp-option' + (selectedRespId === r.id ? ' selected' : '');
    btn.textContent = r.nome;
    btn.dataset.id = r.id;
    btn.onclick = () => selectResp(r.id);
    el.appendChild(btn);
  });
}

function selectResp(id) {
  selectedRespId = id;
  document.querySelectorAll('.resp-option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.id === id);
  });
}

async function addResponsavel() {
  const nome = document.getElementById('new-resp-nome').value.trim();
  const cor = document.getElementById('new-resp-color').value;
  if (!nome) return;
  await sb.from('tarefas_responsaveis').insert({ nome, cor });
  document.getElementById('new-resp-nome').value = '';
  await loadResponsaveis();
  showToast('Responsável adicionado');
}

async function deleteResponsavel(id) {
  if (!confirm('Remover este responsável?')) return;
  await sb.from('tarefas_responsaveis').delete().eq('id', id);
  await loadResponsaveis();
  renderAtivas();
}

// ── TAREFAS ATIVAS ──
async function loadAtivas() {
  const { data } = await sb.from('tarefas')
    .select('*, tarefas_responsaveis(id, nome, cor)')
    .eq('status', 'ativa')
    .order('criado_em', { ascending: true });
  tarefasAtivas = data || [];
  renderAtivas();
}

function renderAtivas() {
  const loading = document.getElementById('loading-ativas');
  const list = document.getElementById('list-ativas');
  const empty = document.getElementById('empty-ativas');

  loading.style.display = 'none';

  if (tarefasAtivas.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.style.display = 'flex';
  list.innerHTML = '';

  tarefasAtivas.forEach(t => {
    const card = buildTaskCard(t);
    list.appendChild(card);
  });
}

function buildTaskCard(t) {
  const div = document.createElement('div');
  div.className = 'task-card';
  div.id = 'task-' + t.id;

  const resp = t.tarefas_responsaveis;
  const cor = resp ? resp.cor : '#cccccc';
  div.style.setProperty('--resp-cor', cor);
  div.querySelector ? null : null;

  // barra lateral colorida
  const before = document.createElement('style');
  before.textContent = `#task-${t.id}::before { background: ${cor}; }`;
  document.head.appendChild(before);

  const age = getAge(t.criado_em);
  const ageClass = age.days > 15 ? 'alert' : age.days > 7 ? 'warn' : '';

  const respTag = resp
    ? `<button class="resp-tag" style="background:${cor};color:${getTextColor(cor)}" onclick="openAssignModal('${t.id}')">${resp.nome}</button>`
    : `<button class="resp-tag" style="background:#e0e0de;color:#888" onclick="openAssignModal('${t.id}')">atribuir</button>`;

  div.innerHTML = `
    <div class="task-check" onclick="concluirTarefa('${t.id}')"></div>
    <div class="task-content">
      <div class="task-title">${escapeHtml(t.titulo)}</div>
      <div class="task-meta">
        ${respTag}
        <span class="task-age ${ageClass}">${age.label}</span>
      </div>
    </div>
    <button class="task-delete" onclick="deletarTarefa('${t.id}')" title="Remover">✕</button>
  `;

  return div;
}

function getAge(isoDate) {
  const diff = Date.now() - new Date(isoDate).getTime();
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor(diff / 3600000);
  if (days === 0) return { days: 0, label: `${hours}h criado` };
  if (days === 1) return { days: 1, label: '1d criado' };
  return { days, label: `${days}d criado` };
}

function getTextColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 150 ? '#1a1a1a' : '#ffffff';
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function concluirTarefa(id) {
  await sb.from('tarefas').update({ status: 'concluida', concluido_em: new Date().toISOString() }).eq('id', id);
  tarefasAtivas = tarefasAtivas.filter(t => t.id !== id);
  renderAtivas();
  showToast('Tarefa concluída ✓');
}

async function deletarTarefa(id) {
  if (!confirm('Remover esta tarefa?')) return;
  await sb.from('tarefas').delete().eq('id', id);
  tarefasAtivas = tarefasAtivas.filter(t => t.id !== id);
  renderAtivas();
}

// ── ATRIBUIR ──
function openAssignModal(taskId) {
  assigningTaskId = taskId;
  const el = document.getElementById('assign-options');
  el.innerHTML = '';
  responsaveis.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'assign-option';
    btn.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${r.cor};display:inline-block;flex-shrink:0"></span>${r.nome}`;
    btn.onclick = () => assignTask(r.id);
    el.appendChild(btn);
  });
  // opção sem responsável
  const none = document.createElement('button');
  none.className = 'assign-option';
  none.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:#ddd;display:inline-block;flex-shrink:0"></span>Sem responsável`;
  none.onclick = () => assignTask(null);
  el.appendChild(none);

  document.getElementById('assign-overlay').classList.add('open');
}

function closeAssignModal() {
  document.getElementById('assign-overlay').classList.remove('open');
  assigningTaskId = null;
}

function closeAssignIfOutside(e) {
  if (e.target === document.getElementById('assign-overlay')) closeAssignModal();
}

async function assignTask(respId) {
  await sb.from('tarefas').update({ responsavel_id: respId }).eq('id', assigningTaskId);
  closeAssignModal();
  await loadAtivas();
}

// ── HISTÓRICO ──
async function loadHistorico() {
  const loading = document.getElementById('loading-hist');
  const list = document.getElementById('list-historico');
  const empty = document.getElementById('empty-hist');

  loading.style.display = 'block';
  list.style.display = 'none';

  const { data } = await sb.from('tarefas')
    .select('*, tarefas_responsaveis(nome, cor)')
    .eq('status', 'concluida')
    .order('concluido_em', { ascending: false });

  loading.style.display = 'none';

  if (!data || data.length === 0) {
    empty.style.display = 'block';
    return;
  }

  // agrupar por mês
  const grupos = {};
  data.forEach(t => {
    const d = new Date(t.concluido_em || t.criado_em);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    if (!grupos[key]) grupos[key] = { label, items: [] };
    grupos[key].items.push(t);
  });

  empty.style.display = 'none';
  list.style.display = 'block';
  list.innerHTML = '';

  Object.keys(grupos).sort().reverse().forEach(key => {
    const g = grupos[key];
    const group = document.createElement('div');
    group.className = 'month-group';
    group.innerHTML = `<div class="month-label">${g.label}</div>`;
    g.items.forEach(t => {
      const resp = t.tarefas_responsaveis;
      const cor = resp ? resp.cor : '#ccc';
      const concDate = t.concluido_em ? new Date(t.concluido_em).toLocaleDateString('pt-BR') : '';
      const card = document.createElement('div');
      card.className = 'hist-card';
      card.style.borderLeft = `3px solid ${cor}`;
      card.innerHTML = `
        <div class="hist-check"></div>
        <div class="hist-title">${escapeHtml(t.titulo)}</div>
        <div class="hist-info">${resp ? resp.nome + '<br>' : ''}${concDate}</div>
      `;
      group.appendChild(card);
    });
    list.appendChild(group);
  });
}

// ── MODAL NOVA TAREFA ──
function openModal() {
  selectedRespId = null;
  document.getElementById('nova-titulo').value = '';
  renderRespOptions();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('nova-titulo').focus(), 300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalIfOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function criarTarefa() {
  const titulo = document.getElementById('nova-titulo').value.trim();
  if (!titulo) { showToast('Digite o título da tarefa'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;

  await sb.from('tarefas').insert({
    titulo,
    responsavel_id: selectedRespId || null,
    status: 'ativa'
  });

  btn.disabled = false;
  closeModal();
  await loadAtivas();
  showToast('Tarefa criada');
}

// ── REALTIME ──
function setupRealtime() {
  sb.channel('tarefas-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tarefas' }, async () => {
      await loadAtivas();
      if (currentTab === 'historico') await loadHistorico();
    })
    .subscribe();
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['ativas','historico','config'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('fab').classList.toggle('hidden', tab !== 'ativas');

  if (tab === 'historico') loadHistorico();
  if (tab === 'config') renderResponsaveis();
}

// ── TOAST ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── ENTER no modal ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('nova-titulo').addEventListener('keydown', e => {
    if (e.key === 'Enter') criarTarefa();
  });
  document.getElementById('new-resp-nome').addEventListener('keydown', e => {
    if (e.key === 'Enter') addResponsavel();
  });
  init();
});
</script>
